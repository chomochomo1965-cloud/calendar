<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3行メモカレンダー</title>
<style>
body { font-family: sans-serif; text-align:center; margin:20px; background:#f0f0f0; }
table { border-collapse:collapse; margin:0 auto; background:#fff; }
th, td { border:1px solid #ccc; width:40px; height:40px; text-align:center; vertical-align:middle; cursor:pointer; position:relative; }
th { background:#4CAF50; color:#fff; }
td:hover { background:#d4f0d4; }
.today { background:#FFEB3B; }
.memo-mark { position:absolute; bottom:2px; right:2px; font-size:12px; color:red; }

/* モーダル共通 */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:#fff; padding:20px; border-radius:10px; width:90%; max-width:400px; text-align:left; }
.modal-content textarea, .modal-content select { width:100%; font-size:16px; margin-top:5px; margin-bottom:10px; }
.modal-content textarea { height:50px; }
.modal-content button { margin-top:10px; padding:8px 12px; font-size:16px; border:none; border-radius:5px; cursor:pointer; }
#saveMemo { background:#4CAF50; color:#fff; }
#closeMemo { background:#f44336; color:#fff; margin-left:10px; }
#navButtons { margin-bottom:10px; }
#navButtons button { margin:0 10px; padding:5px 10px; font-size:16px; border:none; border-radius:5px; cursor:pointer; background:#2196F3; color:#fff; }
#memoList div { padding:5px 10px; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; align-items:center; }
#memoList div:hover { background:#e0e0e0; }
.deleteBtn { background:#f44336; color:#fff; border:none; border-radius:5px; padding:3px 6px; cursor:pointer; }
</style>
</head>
<body>

<h2 id="monthYear"></h2>
<div id="navButtons">
  <button id="prevMonth">前月</button>
  <button id="nextMonth">翌月</button>
</div>
<table>
  <thead>
    <tr>
      <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
    </tr>
  </thead>
  <tbody id="calendarBody"></tbody>
</table>

<!-- メモ入力モーダル -->
<div id="memoModal" class="modal">
  <div class="modal-content">
    <h3 id="memoDateTitle"></h3>

    <label>顧客リスト:</label>
    <select class="memoPresetLine" data-target="line1">
      <option value="">選択</option>
      <option value="A">A</option><option value="B">B</option><option value="C">C</option>
      <option value="D">D</option><option value="E">E</option><option value="F">F</option>
      <option value="G">G</option><option value="H">H</option><option value="I">I</option>
      <option value="J">J</option>
    </select>
    <textarea id="line1" placeholder="自由入力も可能"></textarea>

    <label>行事リスト:</label>
    <select class="memoPresetLine" data-target="line2">
      <option value="">選択</option>
      <option value="A">A</option><option value="B">B</option><option value="C">C</option>
      <option value="D">D</option><option value="E">E</option><option value="F">F</option>
      <option value="G">G</option><option value="H">H</option><option value="I">I</option>
      <option value="J">J</option>
    </select>
    <textarea id="line2" placeholder="自由入力も可能"></textarea>

    <label>備考リスト:</label>
    <select class="memoPresetLine" data-target="line3">
      <option value="">選択</option>
      <option value="A">A</option><option value="B">B</option><option value="C">C</option>
      <option value="D">D</option><option value="E">E</option><option value="F">F</option>
      <option value="G">G</option><option value="H">H</option><option value="I">I</option>
      <option value="J">J</option>
    </select>
    <textarea id="line3" placeholder="自由入力も可能"></textarea>

    <div style="text-align:right;">
      <button id="saveMemo">保存</button>
      <button id="closeMemo">閉じる</button>
    </div>
  </div>
</div>

<!-- メモ一覧モーダル -->
<div id="memoListModal" class="modal">
  <div class="modal-content">
    <h3>保存メモ一覧</h3>
    <div id="memoList"></div>
    <div style="text-align:right;">
      <button id="closeMemoList">閉じる</button>
    </div>
  </div>
</div>

<script>
const calendarBody=document.getElementById('calendarBody');
const memoModal=document.getElementById('memoModal');
const memoDateTitle=document.getElementById('memoDateTitle');
const memoPresetLines=document.querySelectorAll('.memoPresetLine');
const memoListModal=document.getElementById('memoList');
const memoListDiv=document.getElementById('memoList');

let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();
let selectedDateStr='';

function getWeekday(year,month,day){
  const weekdays=['日','月','火','水','木','金','土'];
  return weekdays[new Date(year,month,day).getDay()];
}

function generateCalendar(year,month){
  calendarBody.innerHTML='';
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDay=firstDay.getDay();
  const totalDays=lastDay.getDate();
  let row=document.createElement('tr');
  for(let i=0;i<startDay;i++) row.appendChild(document.createElement('td'));

  for(let day=1;day<=totalDays;day++){
    if(row.children.length===7){ calendarBody.appendChild(row); row=document.createElement('tr'); }
    const cell=document.createElement('td');
    cell.textContent=day;
    const today=new Date();
    if(year===today.getFullYear() && month===today.getMonth() && day===today.getDate()) cell.classList.add('today');

    const dateStr=`${year}-${month+1}-${day}`;
    if(localStorage.getItem('memo-'+dateStr)){
      const mark=document.createElement('span');
      mark.textContent='●';
      mark.className='memo-mark';
      mark.addEventListener('click',(e)=>{
        e.stopPropagation();
        showMemoList();
      });
      cell.appendChild(mark);
    }

    cell.addEventListener('click',()=>{
      selectedDateStr=dateStr;
      const weekday=getWeekday(year,month,day);
      memoDateTitle.textContent=`${month+1}月${day}日(${weekday})`;
      const saved=JSON.parse(localStorage.getItem('memo-'+dateStr) || '{}');
      document.getElementById('line1').value=saved.line1 || '';
      document.getElementById('line2').value=saved.line2 || '';
      document.getElementById('line3').value=saved.line3 || '';
      memoPresetLines.forEach(sel=>sel.value='');
      memoModal.style.display='flex';
    });

    row.appendChild(cell);
  }
  while(row.children.length<7) row.appendChild(document.createElement('td'));
  calendarBody.appendChild(row);

  const monthNames=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  document.getElementById('monthYear').textContent=`${year}年 ${monthNames[month]}`;
}

// プルダウン選択で対応テキスト欄に反映
memoPresetLines.forEach(sel=>{
  sel.addEventListener('change',()=>{
    const targetId = sel.dataset.target;
    if(sel.value){
      document.getElementById(targetId).value = sel.value;
    }
  });
});

// 保存
document.getElementById('saveMemo').addEventListener('click',()=>{
  const obj={
    line1: document.getElementById('line1').value,
    line2: document.getElementById('line2').value,
    line3: document.getElementById('line3').value
  };
  if(obj.line1 || obj.line2 || obj.line3){
    localStorage.setItem('memo-'+selectedDateStr, JSON.stringify(obj));
  } else {
    localStorage.removeItem('memo-'+selectedDateStr);
  }
  memoModal.style.display='none';
  generateCalendar(currentYear,currentMonth);
});

// 閉じる
document.getElementById('closeMemo').addEventListener('click',()=>{memoModal.style.display='none';});

// 前月・翌月
document.getElementById('prevMonth').addEventListener('click',()=>{
  currentMonth--; if(currentMonth<0){ currentMonth=11; currentYear--; }
  generateCalendar(currentYear,currentMonth);
});
document.getElementById('nextMonth').addEventListener('click',()=>{
  currentMonth++; if(currentMonth>11){ currentMonth=0; currentYear++; }
  generateCalendar(currentYear,currentMonth);
});

// メモ一覧表示
function showMemoList(){
  memoListDiv.innerHTML='';
  for(let key in localStorage){
    if(key.startsWith('memo-')){
      const val=JSON.parse(localStorage.getItem(key));
      const parts=key.replace('memo-','').split('-');
      const y=Number(parts[0]), m=Number(parts[1]), d=Number(parts[2]);
      const weekday=getWeekday(y,m-1,d);
      const div=document.createElement('div');
      div.innerHTML=`${m}/${d}(${weekday}):<br>
        顧客: ${val.line1 || ''}<br>
        行事: ${val.line2 || ''}<br>
        備考: ${val.line3 || ''}`;
      const delBtn=document.createElement('button');
      delBtn.textContent='削除';
      delBtn.className='deleteBtn';
      delBtn.addEventListener('click',()=>{
        localStorage.removeItem(key);
        showMemoList();
        generateCalendar(currentYear,currentMonth);
      });
      div.appendChild(delBtn);
      memoListDiv.appendChild(div);
    }
  }
  memoListModal.style.display='flex';
}

// メモ一覧閉じる
document.getElementById('closeMemoList').addEventListener('click',()=>{memoListModal.style.display='none';});

// 初期表示
generateCalendar(currentYear,currentMonth);
</script>

</body>
</html>
