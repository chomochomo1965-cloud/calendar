<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモカレンダー</title>

<style>
body { font-family: sans-serif; text-align:center; margin:20px; background:#f0f0f0; }
table { border-collapse:collapse; margin:0 auto; background:#fff; }
th, td { border:1px solid #ccc; width:40px; height:40px; text-align:center; cursor:pointer; position:relative; }
th { background:#4CAF50; color:#fff; }
td:hover { background:#d4f0d4; }

.memo-mark {
  position:absolute;
  bottom:2px;
  right:2px;
  color:red;
  font-weight:bold;
}

/* ナビ */
#navButtons button {
  margin:0 10px;
  padding:5px 10px;
  font-size:16px;
}

/* モーダル */
.modal {
  display:none;
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:450px;
  text-align:left;
}

/* 横並び */
.lineContainer { display:flex; gap:10px; }

select, textarea {
  width:100%;
  font-size:16px;
  margin-bottom:10px;
}
textarea { height:50px; }

/* 保存一覧 */
#memoListAlways {
  margin-top:20px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
  text-align:left;
}

#memoListAlways div {
  padding:5px;
  border-bottom:1px solid #ccc;
  display:flex;
  flex-direction:column;
}

#memoListAlways p {
  margin:2px 0;
}

.deleteBtn {
  align-self:flex-end;
  margin-top:5px;
}
</style>
</head>

<body>

<h2 id="monthYear"></h2>

<div id="navButtons">
<button id="prevMonth">前月</button>
<button id="nextMonth">翌月</button>
</div>

<table>
<thead>
<tr>
<th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
</tr>
</thead>
<tbody id="calendarBody"></tbody>
</table>

<!-- モーダル -->
<div id="memoModal" class="modal">
<div class="modal-content">
<h3 id="memoDateTitle"></h3>

<!-- 予定1～4 -->
<div>
<h4>予定1</h4>
<div class="lineContainer">
<select class="memo" data-key="line1-1"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line1-2"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line1-3"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
</div>

<h4>予定2</h4>
<div class="lineContainer">
<select class="memo" data-key="line2-1"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line2-2"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line2-3"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
</div>

<h4>予定3</h4>
<div class="lineContainer">
<select class="memo" data-key="line3-1"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line3-2"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line3-3"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
</div>

<h4>予定4</h4>
<div class="lineContainer">
<select class="memo" data-key="line4-1"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line4-2"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
<select class="memo" data-key="line4-3"><option value=""></option><option>A</option><option>B</option><option>C</option></select>
</div>
</div>

<textarea id="line5" placeholder="自由入力"></textarea>

<button id="saveMemo">保存</button>
<button id="closeMemo">閉じる</button>

</div>
</div>

<h3>保存メモ一覧</h3>
<div id="memoListAlways"></div>

<script>
const calendarBody=document.getElementById('calendarBody');
const memoModal=document.getElementById('memoModal');
const memoDateTitle=document.getElementById('memoDateTitle');
const memoListAlways=document.getElementById('memoListAlways');
const selects=document.querySelectorAll('.memo');

let y=new Date().getFullYear();
let m=new Date().getMonth();
let selectedKey='';

function pad2(n){return n.toString().padStart(2,'0');}

function generateCalendar(){
calendarBody.innerHTML='';
const first=new Date(y,m,1);
const last=new Date(y,m+1,0);
let row=document.createElement('tr');

for(let i=0;i<first.getDay();i++) row.appendChild(document.createElement('td'));

for(let d=1;d<=last.getDate();d++){
if(row.children.length===7){calendarBody.appendChild(row);row=document.createElement('tr');}

const td=document.createElement('td');
td.textContent=d;

const key=`memo-${pad2(y)}-${pad2(m+1)}-${pad2(d)}`;

if(localStorage.getItem(key)){
const mark=document.createElement('span');
mark.textContent='●';
mark.className='memo-mark';
td.appendChild(mark);
}

td.onclick=()=>{
selectedKey=key;
memoDateTitle.textContent=`${m+1}/${d}`;
const data=JSON.parse(localStorage.getItem(key)||'{}');

selects.forEach(s=>s.value=data[s.dataset.key]||'');
document.getElementById('line5').value=data.line5||'';

memoModal.style.display='flex';
};

row.appendChild(td);
}
calendarBody.appendChild(row);

document.getElementById('monthYear').textContent=`${y}年 ${m+1}月`;

updateList();
}

document.getElementById('saveMemo').onclick=()=>{
const obj={};
selects.forEach(s=>obj[s.dataset.key]=s.value);
obj.line5=document.getElementById('line5').value;

if(Object.values(obj).some(v=>v)){
localStorage.setItem(selectedKey,JSON.stringify(obj));
}else{
localStorage.removeItem(selectedKey);
}

memoModal.style.display='none';
generateCalendar();
};

document.getElementById('closeMemo').onclick=()=>memoModal.style.display='none';

document.getElementById('prevMonth').onclick=()=>{m--;if(m<0){m=11;y--;}generateCalendar();}
document.getElementById('nextMonth').onclick=()=>{m++;if(m>11){m=0;y++;}generateCalendar();}

function updateList(){
memoListAlways.innerHTML='';

Object.keys(localStorage).filter(k=>k.startsWith('memo-')).sort().forEach(k=>{
const v=JSON.parse(localStorage.getItem(k));
const div=document.createElement('div');

const h=document.createElement('strong');
h.textContent=k.replace('memo-','');
div.appendChild(h);

for(let i=1;i<=4;i++){
const a=v[`line${i}-1`]||'';
const b=v[`line${i}-2`]||'';
const c=v[`line${i}-3`]||'';
if(!a&&!b&&!c) continue;

const p=document.createElement('p');
p.textContent=`〇${a} ${b} ${c}`;
div.appendChild(p);
}

if(v.line5){
const p=document.createElement('p');
p.textContent=v.line5;
div.appendChild(p);
}

const btn=document.createElement('button');
btn.textContent='削除';
btn.className='deleteBtn';
btn.onclick=()=>{localStorage.removeItem(k);generateCalendar();};

div.appendChild(btn);
memoListAlways.appendChild(div);
});
}

generateCalendar();
</script>

</body>
</html>
