<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモカレンダー</title>

<style>
body { font-family: sans-serif; text-align:center; margin:20px; background:#f0f0f0; }

h2 {
  font-size:24px;
  margin-bottom:10px;
}

table { border-collapse:collapse; margin:0 auto; background:#fff; }
th, td {
  border:1px solid #ccc;
  width:45px;
  height:45px;
  text-align:center;
  vertical-align:middle;
  cursor:pointer;
  position:relative;
}
th { background:#4CAF50; color:#fff; }
td:hover { background:#d4f0d4; }

.memo-mark {
  position:absolute;
  bottom:2px;
  right:2px;
  font-size:16px;
  color:red;
  font-weight:bold;
}

/* ボタン大きめ */
#navButtons button {
  margin:0 10px;
  padding:12px 20px;
  font-size:20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#2196F3;
  color:#fff;
}

/* モーダル */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:450px;
}
.modal-content textarea {
  width:100%;
  height:60px;
  font-size:16px;
}

/* 保存メモ一覧 */
#memoListAlways {
  margin-top:20px;
  text-align:left;
  max-width:600px;
  margin:auto;
  font-size:18px;
}
#memoListAlways p {
  margin:0;
  line-height:1.4;
}
#memoListAlways strong {
  font-size:20px;
}

/* 削除ボタン */
.deleteBtn {
  background:#f44336;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:10px 16px;
  font-size:18px;
  cursor:pointer;
  margin-top:5px;
}
</style>
</head>

<body>

<h2 id="monthYear"></h2>

<div id="navButtons">
  <button id="prevMonth">前月</button>
  <button id="nextMonth">翌月</button>
</div>

<table>
<thead>
<tr>
<th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
</tr>
</thead>
<tbody id="calendarBody"></tbody>
</table>

<!-- モーダル -->
<div id="memoModal" class="modal">
  <div class="modal-content">
    <h3 id="memoDateTitle"></h3>
    <textarea id="line5" placeholder="自由入力"></textarea>
    <br>
    <button id="saveMemo">保存</button>
    <button id="closeMemo">閉じる</button>
  </div>
</div>

<h3>保存メモ一覧</h3>
<div id="memoListAlways"></div>

<script>
const calendarBody = document.getElementById('calendarBody');
const memoModal = document.getElementById('memoModal');
const memoDateTitle = document.getElementById('memoDateTitle');
const memoListAlways = document.getElementById('memoListAlways');

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedDateStr = '';

function pad2(n){ return n.toString().padStart(2,'0'); }

function generateCalendar(year,month){
  calendarBody.innerHTML='';

  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);

  let row=document.createElement('tr');

  for(let i=0;i<firstDay.getDay();i++){
    row.appendChild(document.createElement('td'));
  }

  for(let day=1;day<=lastDay.getDate();day++){

    if(row.children.length===7){
      calendarBody.appendChild(row);
      row=document.createElement('tr');
    }

    const cell=document.createElement('td');
    cell.textContent=day;

    const key=`memo-${pad2(year)}-${pad2(month+1)}-${pad2(day)}`;

    if(localStorage.getItem(key)){
      const mark=document.createElement('span');
      mark.textContent='●';
      mark.className='memo-mark';
      cell.appendChild(mark);
    }

    cell.onclick=()=>{
      selectedDateStr=key;
      memoDateTitle.textContent=`${month+1}月${day}日`;
      const saved=JSON.parse(localStorage.getItem(key)||'{}');
      document.getElementById('line5').value=saved.line5||'';
      memoModal.style.display='flex';
    };

    row.appendChild(cell);
  }

  calendarBody.appendChild(row);

  /* ★ここが追加（タイトル復活） */
  const monthNames = ["1月","2月","3月","4月","5月","6月",
                      "7月","8月","9月","10月","11月","12月"];

  document.getElementById('monthYear').textContent =
    `${year}年 ${monthNames[month]}`;

  updateMemoListAlways();
}

/* 保存 */
document.getElementById('saveMemo').onclick=()=>{
  const text=document.getElementById('line5').value;

  if(text){
    localStorage.setItem(selectedDateStr,JSON.stringify({line5:text}));
  }else{
    localStorage.removeItem(selectedDateStr);
  }

  memoModal.style.display='none';
  generateCalendar(currentYear,currentMonth);
};

document.getElementById('closeMemo').onclick=()=>{
  memoModal.style.display='none';
};

/* 月移動 */
document.getElementById('prevMonth').onclick=()=>{
  currentMonth--;
  if(currentMonth<0){ currentMonth=11; currentYear--; }
  generateCalendar(currentYear,currentMonth);
};

document.getElementById('nextMonth').onclick=()=>{
  currentMonth++;
  if(currentMonth>11){ currentMonth=0; currentYear++; }
  generateCalendar(currentYear,currentMonth);
};

/* 一覧 */
function updateMemoListAlways(){
  memoListAlways.innerHTML='';

  Object.keys(localStorage)
    .filter(k=>k.startsWith('memo-'))
    .sort()
    .forEach(key=>{

      const val=JSON.parse(localStorage.getItem(key));
      const parts=key.split('-');

      const div=document.createElement('div');

      const header=document.createElement('strong');
      header.textContent=`${parts[2]}/${parts[3]}`;
      div.appendChild(header);

      if(val.line5){
        const p=document.createElement('p');
        p.innerHTML=val.line5.replace(/\r\n|\r|\n/g,'<br>');
        div.appendChild(p);
      }

      const btn=document.createElement('button');
      btn.textContent='削除';
      btn.className='deleteBtn';
      btn.onclick=()=>{
        localStorage.removeItem(key);
        generateCalendar(currentYear,currentMonth);
      };

      div.appendChild(btn);
      memoListAlways.appendChild(div);
    });
}

generateCalendar(currentYear,currentMonth);
</script>

</body>
</html>
